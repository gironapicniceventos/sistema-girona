# Nombre de proyecto fijo: evita que Compose intente parar contenedores huérfanos
# de otro project name (p. ej. tras fallos «permission denied» al stop).
name: gironastack

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-girona_prod}
      POSTGRES_USER: ${POSTGRES_USER:-girona_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-girona_pass_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-girona_user} -d ${POSTGRES_DB:-girona_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Puerto en el HOST: 25432 (antes 15432) para esquivar docker-proxy huérfanos con Docker Snap
    # que a veces dejan ocupado 15432 incluso tras `systemctl restart docker`.
    # Desde fuera del compose: psql/pgadmin -> localhost:25432 -> contenedor :5432
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"

  backend:
    build:
      context: ./girona-back
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    # Credenciales Factus: definir en .env y/o en .env.factus (este último sobrescribe).
    env_file:
      - path: .env
        required: true
      - path: .env.factus
        required: false
    environment:
      GIRONA_DB_WAIT_HOST: host.docker.internal
      GIRONA_DB_WAIT_PORT: "${POSTGRES_HOST_PORT:-25432}"
      DATABASE_URL: postgresql://${POSTGRES_USER:-girona_user}:${POSTGRES_PASSWORD:-girona_pass_change_me}@host.docker.internal:${POSTGRES_HOST_PORT:-25432}/${POSTGRES_DB:-girona_prod}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-1}
      AUTO_MIGRATE_SCHEMA: ${AUTO_MIGRATE_SCHEMA:-1}
      FACTUS_ENABLED: ${FACTUS_ENABLED:-1}
      FACTUS_ENVIRONMENT: ${FACTUS_ENVIRONMENT:-sandbox}
      FACTUS_API_BASE_URL: ${FACTUS_API_BASE_URL:-https://api-sandbox.factus.com.co}
      FACTUS_TOKEN_URL: ${FACTUS_TOKEN_URL:-https://api-sandbox.factus.com.co/oauth/token}
      FACTUS_NUMBERING_RANGE_ID: ${FACTUS_NUMBERING_RANGE_ID:-}
      FACTUS_PAYMENT_FORM_CODE: ${FACTUS_PAYMENT_FORM_CODE:-1}
      FACTUS_PAYMENT_METHOD_CODE: ${FACTUS_PAYMENT_METHOD_CODE:-10}
      FACTUS_OPERATION_TYPE: ${FACTUS_OPERATION_TYPE:-10}
      FACTUS_DEFAULT_CUSTOMER_EMAIL: ${FACTUS_DEFAULT_CUSTOMER_EMAIL:-}
      FACTUS_DEFAULT_CUSTOMER_ADDRESS: ${FACTUS_DEFAULT_CUSTOMER_ADDRESS:-No informado}
      FACTUS_DEFAULT_MUNICIPALITY_ID: ${FACTUS_DEFAULT_MUNICIPALITY_ID:-}
      FACTUS_IDENTIFICATION_DOCUMENT_ID: ${FACTUS_IDENTIFICATION_DOCUMENT_ID:-3}
      FACTUS_LEGAL_ORGANIZATION_ID: ${FACTUS_LEGAL_ORGANIZATION_ID:-2}
      FACTUS_CUSTOMER_TRIBUTE_ID: ${FACTUS_CUSTOMER_TRIBUTE_ID:-21}
      FACTUS_ITEM_STANDARD_CODE_ID: ${FACTUS_ITEM_STANDARD_CODE_ID:-1}
      FACTUS_ITEM_UNIT_MEASURE_ID: ${FACTUS_ITEM_UNIT_MEASURE_ID:-70}
      FACTUS_ITEM_TRIBUTE_ID: ${FACTUS_ITEM_TRIBUTE_ID:-2}
      FACTUS_ESTABLISHMENT_NAME: ${FACTUS_ESTABLISHMENT_NAME:-}
      FACTUS_ESTABLISHMENT_ADDRESS: ${FACTUS_ESTABLISHMENT_ADDRESS:-}
      FACTUS_ESTABLISHMENT_PHONE: ${FACTUS_ESTABLISHMENT_PHONE:-}
      FACTUS_ESTABLISHMENT_EMAIL: ${FACTUS_ESTABLISHMENT_EMAIL:-}
      FACTUS_ESTABLISHMENT_MUNICIPALITY_ID: ${FACTUS_ESTABLISHMENT_MUNICIPALITY_ID:-}
      FACTUS_CREDIT_NOTE_NUMBERING_RANGE_ID: ${FACTUS_CREDIT_NOTE_NUMBERING_RANGE_ID:-}
      FACTUS_CREDIT_NOTE_CORRECTION_CODE: ${FACTUS_CREDIT_NOTE_CORRECTION_CODE:-2}
      FACTUS_CREDIT_NOTE_CUSTOMIZATION_ID: ${FACTUS_CREDIT_NOTE_CUSTOMIZATION_ID:-20}
    # Puerto en el HOST hacia el API (uvicorn sigue en :8000 dentro del contenedor).
    # Si «address already in use» en 8000 (docker-proxy Snap), define BACKEND_HOST_PORT en .env p. ej. 28000.
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"

  frontend:
    build:
      context: ./girona-front
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    # El servidor de Next (rutas /api/*) debe alcanzar el API vía mismo puerto publicado en host.
    environment:
      BACKEND_URL: http://host.docker.internal:${BACKEND_HOST_PORT:-8000}
      # Navegador (fetch client-side desde el host debe coincidir con BACKEND_HOST_PORT)
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_HOST_PORT:-8000}
      NODE_ENV: production
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"

volumes:
  # Nombre estable: misma BD aunque cambie `name:` del proyecto. Opcional: POSTGRES_DATA_VOLUME_NAME en .env.
  postgres_data:
    name: ${POSTGRES_DATA_VOLUME_NAME:-girona_postgres_data}
